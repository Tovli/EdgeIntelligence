# EXCLUDED from the workspace — host bindings need crates.io (uniffi /
# wasm-bindgen) and cross-targets (wasm32 / aarch64-mobile) unavailable in this
# environment. ADR-001 bindings follow-up.
[package]
name = "el-ffi"
description = "Host bindings: UniFFI (Kotlin/Swift) + wasm-bindgen (web) (ADR-001)."
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[lib]
crate-type = ["lib", "cdylib", "staticlib"]

[dependencies]
el-core = { path = "../../el-core" }
el-runtime = { path = "../../el-runtime" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
uniffi = "0.28"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
